[package]
name = "kobedb-studio"
version = "0.1.0"
description = "KobeDB Studio desktop app"
edition = "2021"
rust-version = "1.77"

[lib]
name = "kobedb_studio_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = "s"
lto = true
strip = true
panic = "abort"
codegen-units = 1
