<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>KobeDB Studio</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0f1115; color: #e6e9ef; font: 15px system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .logo { font-size: 34px; font-weight: 700; color: #3ecf8e; }
    .muted { color: #8b93a7; margin-top: 6px; }
    .spinner { margin-top: 22px; width: 34px; height: 34px; border: 3px solid #2a2f3a;
      border-top-color: #3ecf8e; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">⚡ KobeDB Studio</div>
  <div class="muted">Starting server…</div>
  <div class="spinner"></div>
</body>
</html>
